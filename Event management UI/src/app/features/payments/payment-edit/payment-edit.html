<div class="container mt-4">

  <div class="d-flex justify-content-between mb-4">
    <h3>Edit Payment</h3>
    <a routerLink="/payments" class="btn btn-outline-secondary">
      ← Back
    </a>
  </div>

  <div class="card shadow p-4">

    <div class="row g-3">

      <!-- Amount -->
      <div class="col-md-6">
        <label>Amount *</label>
        <input type="number"
               class="form-control"
               [(ngModel)]="payment.amount">
      </div>

      <!-- Method -->
      <div class="col-md-6">
        <label>Payment Method *</label>
        <select class="form-select"
                [(ngModel)]="payment.method">
          <option>Cash</option>
          <option>bKash</option>
          <option>Nagad</option>
          <option>Bank Transfer</option>
          <option>Card</option>
        </select>
      </div>

      <!-- Date -->
      <div class="col-md-6">
        <label>Date *</label>
        <input type="date"
               class="form-control"
               [(ngModel)]="payment.date">
      </div>

      <!-- Reference -->
      <div class="col-md-6">
        <label>Reference</label>
        <input type="text"
               class="form-control"
               [(ngModel)]="payment.reference">
      </div>

      <!-- Notes -->
      <div class="col-12">
        <label>Notes</label>
        <textarea class="form-control"
                  rows="3"
                  [(ngModel)]="payment.notes">
        </textarea>
      </div>

    </div>

  </div>

  <div *ngIf="errorMessage"
       class="alert alert-danger mt-3">
    {{ errorMessage }}
  </div>

  <div class="d-flex justify-content-end mt-4">
    <button class="btn btn-success"
            (click)="updatePayment()">
      Update Payment
    </button>
  </div>

</div>
