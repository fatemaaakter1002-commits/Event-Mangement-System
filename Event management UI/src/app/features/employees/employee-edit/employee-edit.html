<div class="container-fluid mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">Edit Employee Details</h4>
    <a routerLink="/employees" class="btn btn-outline-secondary btn-sm">
      <i class="fas fa-arrow-left me-1"></i> Back to List
    </a>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body p-4">
      <form [formGroup]="employeeForm" (ngSubmit)="onSubmit()">
        <div class="row g-3">
          <!-- Name -->
          <div class="col-md-6">
            <label class="form-label text-muted small fw-bold">Full Name *</label>
            <input type="text" class="form-control" placeholder="Enter full name" formControlName="name">
          </div>

          <!-- Email -->
          <div class="col-md-6">
            <label class="form-label text-muted small fw-bold">Email Address *</label>
            <input type="email" class="form-control" placeholder="email@company.com" formControlName="email">
          </div>

          <!-- Phone -->
          <div class="col-md-6">
            <label class="form-label text-muted small fw-bold">Phone Number *</label>
            <input type="text" class="form-control" placeholder="+1234567890" formControlName="phone">
          </div>

          <!-- Designation Dropdown -->
          <div class="col-md-6">
            <label class="form-label text-muted small fw-bold">Designation *</label>
            <select class="form-select" formControlName="designation">
              <option value="">Select Designation</option>
              <option value="Staff">Staff</option>
              <option value="HR">HR</option>
              <option value="CEO">CEO</option>
              <option value="Manager">Manager</option>
            </select>
          </div>

          <!-- Department -->
          <div class="col-md-6">
            <label class="form-label text-muted small fw-bold">Department *</label>
            <input type="text" class="form-control" placeholder="e.g. Operations, IT" formControlName="department">
          </div>

          <!-- Join Date -->
          <div class="col-md-6">
            <label class="form-label text-muted small fw-bold">Join Date *</label>
            <input type="date" class="form-control" formControlName="joinDate">
          </div>

          <!-- Salary -->
          <div class="col-md-6">
            <label class="form-label text-muted small fw-bold">Monthly Salary (৳) *</label>
            <input type="number" class="form-control" placeholder="0.00" formControlName="salary">
          </div>

          <!-- Status -->
          <div class="col-md-6">
            <label class="form-label text-muted small fw-bold">Employment Status</label>
            <select class="form-select" formControlName="status">
              <option value="Active">Active</option>
              <option value="Inactive">Inactive</option>
            </select>
          </div>
        </div>

        <div class="d-flex justify-content-end mt-4 pt-3 border-top">
          <button type="submit" class="btn btn-primary px-4" [disabled]="employeeForm.invalid || isSubmitting">
            <i class="fas" [ngClass]="isSubmitting ? 'fa-spinner fa-spin' : 'fa-save'"></i>
            <span class="ms-2">{{ isSubmitting ? 'Updating...' : 'Update Employee Profile' }}</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
