<div class="container-fluid mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h3 class="fw-bold text-dark mb-1">Add New Employee</h3>
      <p class="text-muted smaller mb-0">Onboard professional staff to your organization.</p>
    </div>
    <a routerLink="/employees" class="ems-btn ems-btn-outline shadow-sm">
      <i class="fas fa-arrow-left"></i> Back to List
    </a>
  </div>

  <div class="ems-card">
    <form [formGroup]="employeeForm" (ngSubmit)="onSubmit()">
      <div class="row g-2">
        <!-- Name -->
        <div class="col-md-6 ems-form-group">
          <label class="ems-form-label">Full Name *</label>
          <input type="text" class="ems-form-input" placeholder="Enter full name" formControlName="name">
        </div>

        <!-- Email -->
        <div class="col-md-6 ems-form-group">
          <label class="ems-form-label">Email Address *</label>
          <input type="email" class="ems-form-input" placeholder="email@company.com" formControlName="email">
        </div>

        <!-- Phone -->
        <div class="col-md-6 ems-form-group">
          <label class="ems-form-label">Phone Number *</label>
          <input type="text" class="ems-form-input" placeholder="+1234567890" formControlName="phone">
        </div>

        <!-- Designation Dropdown -->
        <div class="col-md-6 ems-form-group">
          <label class="ems-form-label">Designation *</label>
          <select class="ems-form-select" formControlName="designation">
            <option value="">Select Designation</option>
            <option value="Staff">Staff</option>
            <option value="HR">HR</option>
            <option value="CEO">CEO</option>
            <option value="Manager">Manager</option>
          </select>
        </div>

        <!-- Department -->
        <div class="col-md-6 ems-form-group">
          <label class="ems-form-label">Department *</label>
          <input type="text" class="ems-form-input" placeholder="e.g. Operations, IT" formControlName="department">
        </div>

        <!-- Join Date -->
        <div class="col-md-6 ems-form-group">
          <label class="ems-form-label">Join Date *</label>
          <input type="date" class="ems-form-input" formControlName="joinDate">
        </div>

        <!-- Salary -->
        <div class="col-md-6 ems-form-group">
          <label class="ems-form-label">Monthly Salary (৳) *</label>
          <input type="number" class="ems-form-input" placeholder="0.00" formControlName="salary">
        </div>

        <!-- Status -->
        <div class="col-md-6 ems-form-group">
          <label class="ems-form-label">Employment Status</label>
          <select class="ems-form-select" formControlName="status">
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
          </select>
        </div>
      </div>

      <div class="d-flex justify-content-end mt-3 pt-3 border-top">
        <button type="submit" class="ems-btn ems-btn-primary px-5" [disabled]="employeeForm.invalid || isSubmitting">
          <i class="fas" [ngClass]="isSubmitting ? 'fa-spinner fa-spin' : 'fa-save'"></i>
          {{ isSubmitting ? 'Saving...' : 'Register Employee' }}
        </button>
      </div>
    </form>
  </div>
</div>
