<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3>Create Venue</h3>
    <button class="btn btn-outline-secondary" routerLink="/venues">← Back</button>
  </div>

  <!-- BASIC INFO -->
  <div class="card shadow p-4 mb-4">
    <h5 class="mb-3 text-primary">Basic Information</h5>
    <div class="row g-3">
      <div class="col-md-6">
        <label>Venue Name *</label>
        <input type="text" class="form-control"
               placeholder="Enter venue name"
               [(ngModel)]="venue.name">
      </div>
      <div class="col-md-6">
        <label>City *</label>
        <input type="text" class="form-control"
               placeholder="City name"
               [(ngModel)]="venue.location">
      </div>
      <div class="col-md-4">
        <label>Capacity *</label>
        <input type="number" class="form-control"
               [(ngModel)]="venue.capacity">
      </div>
    </div>
  </div>

  <!-- PRICING -->
  <div class="card shadow p-4 mb-4">
    <h5 class="mb-3 text-primary">Pricing Details</h5>
    <div class="row g-3">
      <div class="col-md-6">
        <label>Price Per Day *</label>
        <input type="number" class="form-control"
               [(ngModel)]="venue.price">
      </div>
      <div class="col-md-6">
        <label>Status</label>
        <!-- ✅ Boolean true/false -->
        <select class="form-select" [(ngModel)]="venue.status">
          <option [ngValue]="true">Available</option>
          <option [ngValue]="false">Not Available</option>
        </select>
      </div>
    </div>
  </div>

  <!-- ERROR -->
  <div *ngIf="errorMessage" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <!-- BUTTONS -->
  <div class="d-flex justify-content-end gap-3 mb-5">
    <button class="btn btn-outline-secondary" routerLink="/venues">Cancel</button>
    <button class="btn btn-success px-4" (click)="saveVenue()">Save Venue</button>
  </div>
</div>
