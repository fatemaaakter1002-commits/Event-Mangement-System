<div class="container mt-4">

  <div class="d-flex justify-content-between mb-4">
    <h3>Catering Menu</h3>
    <a routerLink="/catering/create" class="btn btn-success">
      + Add Menu Item
    </a>
  </div>

  <div *ngFor="let category of categories" class="mb-5">

    <div *ngIf="groupedMenus()[category.toLowerCase()]?.length > 0">

      <h5 class="text-primary mb-3">{{ category }}</h5>

      <div class="row">
        <div class="col-md-4 mb-3"
             *ngFor="let item of groupedMenus()[category.toLowerCase()]">

          <div class="card shadow-sm h-100">
            <div class="card-body">

              <h6 class="fw-bold">{{ item.name }}</h6>

              <span class="badge bg-success me-2">
                ৳ {{ item.price }}
              </span>

              <span class="badge"
                [ngClass]="item.type === 'Veg' ? 'bg-success' : 'bg-danger'">
                {{ item.type }}
              </span>

              <div class="mt-2">
                <small class="text-muted">{{ item.status }}</small>
              </div>

              <hr>

              <div class="d-flex justify-content-end gap-2">
                <a [routerLink]="['/catering/edit', item.cateringId]"
                   class="btn btn-sm btn-warning">
                  Edit
                </a>

                <button class="btn btn-sm btn-danger"
                        (click)="deleteMenu(item.cateringId)">
                  Delete
                </button>
              </div>

            </div>
          </div>

        </div>
      </div>

    </div>

  </div>

</div>
